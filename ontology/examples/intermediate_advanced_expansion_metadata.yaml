safe_modifications:
  - change small graph size in QAOA examples
  - change Hamiltonian coefficients
  - change number of shots
  - compare ideal and noisy counts
unsafe_modifications:
  - uploading IBM API keys
  - assuming advanced examples are hardware-ready without testing
  - changing Pauli string length without matching qubit count
student_questions:
  - What problem type does this code represent?
  - What is classical about the problem and what is quantum about the method?
  - Which part of the code defines the Hamiltonian, oracle, ansatz, or measurement?
