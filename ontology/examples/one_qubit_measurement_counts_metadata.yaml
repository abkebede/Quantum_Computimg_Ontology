expected_output:
  - Deterministic X-gate measurement should return mostly or entirely '1'.
  - No-gate measurement should return mostly or entirely '0'.
safe_modifications:
  - remove the X gate
  - add a second X gate
  - change the number of shots
  - compare deterministic X with probabilistic H
unsafe_modifications:
  - use qubit index 1 in a one-qubit circuit
  - measure into a classical bit that does not exist
  - assume all quantum outputs are deterministic
student_questions:
  - What does a shot mean?
  - Why does X change the measured result from 0 to 1?
  - What is the difference between a qubit and a classical bit?
  - Why do later quantum algorithms need many measurements?
hardware_readiness: simulator-first; useful for later hardware readout comparison
